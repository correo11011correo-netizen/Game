<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego 3D Móvil Mejorado</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    // Escena y cámara
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
      60, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Luz
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 5);
    scene.add(light);

    // Jugador (cubo azul)
    const playerGeometry = new THREE.BoxGeometry(1, 1, 1);
    const playerMaterial = new THREE.MeshPhongMaterial({ color: 0x0000ff });
    const player = new THREE.Mesh(playerGeometry, playerMaterial);
    player.position.set(0, -2, 0);
    scene.add(player);

    // Obstáculo (cubo rojo)
    const obstacleGeometry = new THREE.BoxGeometry(1, 1, 1);
    const obstacleMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000 });
    const obstacle = new THREE.Mesh(obstacleGeometry, obstacleMaterial);
    obstacle.position.set(0, 3, 0);
    scene.add(obstacle);

    // Cámara en perspectiva lejana
    camera.position.set(0, 2, 6); // más lejos y arriba
    camera.lookAt(0, 0, 0);

    // Animación
    function animate() {
      requestAnimationFrame(animate);
      obstacle.position.y -= 0.05;
      if (obstacle.position.y < -3) obstacle.position.y = 3;
      renderer.render(scene, camera);
    }
    animate();

    // Controles táctiles: izquierda/derecha
    window.addEventListener("touchstart", e => {
      if (e.touches[0].clientX < window.innerWidth / 2) player.position.x -= 0.2;
      else player.position.x += 0.2;
    });

    // Ajustar tamaño al cambiar pantalla
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
