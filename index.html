<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego 3D Móvil</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    // Escena y cámara
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Cubo jugador
    const geometry = new THREE.BoxGeometry();
    const material = new THREE.MeshBasicMaterial({ color: 0x0000ff });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    camera.position.z = 5;

    // Obstáculo
    const obstacleGeometry = new THREE.BoxGeometry();
    const obstacleMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const obstacle = new THREE.Mesh(obstacleGeometry, obstacleMaterial);
    obstacle.position.y = 2;
    scene.add(obstacle);

    // Animación
    function animate() {
      requestAnimationFrame(animate);
      obstacle.position.y -= 0.02; // baja el obstáculo
      if (obstacle.position.y < -2) obstacle.position.y = 2; // reinicia
      renderer.render(scene, camera);
    }
    animate();

    // Controles táctiles
    window.addEventListener("touchstart", e => {
      if (e.touches[0].clientX < window.innerWidth/2) cube.position.x -= 0.2;
      else cube.position.x += 0.2;
    });
  </script>
</body>
</html>
