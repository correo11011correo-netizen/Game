<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mundo Abierto Joystick Consola</title>
  <style>
    html, body { width:100%; height:100%; margin:0; overflow:hidden; }
    #renderCanvas { width:100%; height:100%; touch-action:none; }

    /* HUD de vida */
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.5);
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      font-family: Arial, sans-serif;
    }

    /* Joystick a la izquierda, más centrado */
    .joystick {
      position: absolute;
      bottom: 60px;
      left: 80px;
      width: 160px;
      height: 160px;
      background: rgba(100,100,100,0.3);
      border-radius: 50%;
      touch-action: none;
    }
    .stick {
      position: absolute;
      top: 60px;
      left: 60px;
      width: 40px;
      height: 40px;
      background: rgba(200,200,200,0.8);
      border-radius: 50%;
    }

    /* Botones a la derecha, más centrados */
    .buttons {
      position: absolute;
      bottom: 60px;
      right: 80px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .btn {
      background: #444;
      color: white;
      font-size: 24px;
      padding: 25px;
      border-radius: 50%;
      border: none;
      width: 80px;
      height: 80px;
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<div id="hud">❤️ Vida: <span id="life">100</span></div>

<!-- Joystick -->
<div class="joystick" id="joystick">
  <div class="stick" id="stick"></div>
</div>

<!-- Botones -->
<div class="buttons">
  <button class="btn" id="attack">⚔️</button>
  <button class="btn" id="interact">🎁</button>
  <button class="btn" id="jump">⤴️</button>
</div>

<script>
  const canvas = document.getElementById("renderCanvas");
  const engine = new BABYLON.Engine(canvas, true);

  const createScene = () => {
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color3(0.5, 0.8, 1);

    // Cámara
    const camera = new BABYLON.ArcRotateCamera("cam", -Math.PI/2, Math.PI/3, 20, BABYLON.Vector3.Zero(), scene);
    camera.attachControl(canvas, true);

    // Luz
    const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0,1,0), scene);

    // Terreno
    const ground = BABYLON.MeshBuilder.CreateGround("ground", {width:50, height:50}, scene);

    // Jugador
    const player = BABYLON.MeshBuilder.CreateBox("player", {size:2}, scene);
    player.position.y = 1;
    player.material = new BABYLON.StandardMaterial("pmat", scene);
    player.material.diffuseColor = new BABYLON.Color3(0,0,1);

    // Vida
    let life = 100;
    const lifeDisplay = document.getElementById("life");

    // Objetos
    const items = [];
    for (let i=0; i<5; i++) {
      const item = BABYLON.MeshBuilder.CreateSphere("item"+i, {diameter:1}, scene);
      item.position.set(Math.random()*40-20, 0.5, Math.random()*40-20);
      item.material = new BABYLON.StandardMaterial("imat", scene);
      item.material.diffuseColor = new BABYLON.Color3(1,1,0);
      items.push(item);
    }

    // Joystick
    const joystick = document.getElementById("joystick");
    const stick = document.getElementById("stick");
    let centerX = joystick.offsetLeft + joystick.offsetWidth/2;
    let centerY = joystick.offsetTop + joystick.offsetHeight/2;
    let moveX = 0, moveZ = 0;

    joystick.addEventListener("touchmove", e => {
      const touch = e.touches[0];
      let dx = touch.clientX - centerX;
      let dy = touch.clientY - centerY;
      let dist = Math.sqrt(dx*dx + dy*dy);
      let maxDist = 70;
      if (dist > maxDist) {
        dx *= maxDist/dist;
        dy *= maxDist/dist;
      }
      stick.style.left = (dx + 60) + "px";
      stick.style.top = (dy + 60) + "px";
      moveX = dx/70 * 0.3;
      moveZ = dy/70 * 0.3;
    });

    joystick.addEventListener("touchend", () => {
      stick.style.left = "60px";
      stick.style.top = "60px";
      moveX = 0; moveZ = 0;
    });

    // Botones
    document.getElementById("attack").addEventListener("touchstart", () => {
      life -= 10;
      if (life < 0) life = 0;
      lifeDisplay.textContent = life;
    });

    document.getElementById("interact").addEventListener("touchstart", () => {
      items.forEach(item => {
        if (BABYLON.Vector3.Distance(player.position, item.position) < 3) {
          item.dispose();
          life += 10;
          if (life > 100) life = 100;
          lifeDisplay.textContent = life;
        }
      });
    });

    document.getElementById("jump").addEventListener("touchstart", () => {
      player.position.y += 2;
      setTimeout(() => player.position.y -= 2, 500);
    });

    // Loop con colisiones y límites
    scene.onBeforeRenderObservable.add(() => {
      player.position.x += moveX;
      player.position.z += moveZ;

      // Límites del mapa
      if (player.position.x > 24) player.position.x = 24;
      if (player.position.x < -24) player.position.x = -24;
      if (player.position.z > 24) player.position.z = 24;
      if (player.position.z < -24) player.position.z = -24;

      camera.target = player.position;
    });

    return scene;
  };

  const scene = createScene();
  engine.runRenderLoop(() => scene.render());
  window.addEventListener("resize", () => engine.resize());
</script>
</body>
</html>
