<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mundo Abierto Móvil</title>
  <style>
    html, body { width:100%; height:100%; margin:0; overflow:hidden; }
    #renderCanvas { width:100%; height:100%; touch-action:none; }
    .controls {
      position: absolute;
      bottom: 10px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    .btn {
      background: #444;
      color: white;
      font-size: 24px;
      padding: 15px;
      border-radius: 8px;
      border: none;
      width: 60px;
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<div class="controls">
  <button class="btn" id="left">⬅️</button>
  <button class="btn" id="up">⬆️</button>
  <button class="btn" id="right">➡️</button>
  <button class="btn" id="jump">⤴️</button>
</div>
<script>
  const canvas = document.getElementById("renderCanvas");
  const engine = new BABYLON.Engine(canvas, true);

  const createScene = () => {
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color3(0.5, 0.8, 1);

    // Cámara en tercera persona
    const camera = new BABYLON.ArcRotateCamera("cam", -Math.PI/2, Math.PI/3, 15, BABYLON.Vector3.Zero(), scene);
    camera.attachControl(canvas, true);

    // Luz
    const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0,1,0), scene);

    // Terreno
    const ground = BABYLON.MeshBuilder.CreateGround("ground", {width:50, height:50}, scene);

    // Personaje jugador
    const player = BABYLON.MeshBuilder.CreateBox("player", {size:2}, scene);
    player.position.y = 1;
    player.material = new BABYLON.StandardMaterial("pmat", scene);
    player.material.diffuseColor = new BABYLON.Color3(0,0,1);

    // Movimiento
    let dirX = 0, dirZ = 0, jumping = false;

    document.getElementById("left").addEventListener("touchstart", () => dirX = -0.2);
    document.getElementById("right").addEventListener("touchstart", () => dirX = 0.2);
    document.getElementById("up").addEventListener("touchstart", () => dirZ = 0.2);
    document.getElementById("jump").addEventListener("touchstart", () => {
      if (!jumping) {
        jumping = true;
        player.position.y += 2;
        setTimeout(() => { player.position.y -= 2; jumping = false; }, 500);
      }
    });

    // Reset al soltar
    ["left","right","up"].forEach(id => {
      document.getElementById(id).addEventListener("touchend", () => { dirX = 0; dirZ = 0; });
    });

    scene.onBeforeRenderObservable.add(() => {
      player.position.x += dirX;
      player.position.z += dirZ;
      camera.target = player.position;
    });

    return scene;
  };

  const scene = createScene();
  engine.runRenderLoop(() => scene.render());
  window.addEventListener("resize", () => engine.resize());
</script>
</body>
</html>
